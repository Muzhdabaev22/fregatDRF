name: Telegram bot poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/cache/restore@v4
        id: poll-cache
        with:
          path: telegram-forward-bot/poll-state.json
          key: telegram-poll-state-v2
          restore-keys: |
            telegram-poll-state-v2

      - name: Poll Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_FORWARD_CHAT_ID: ${{ secrets.TG_FORWARD_CHAT_ID }}
        run: php telegram-forward-bot/poll.php

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: telegram-forward-bot/poll-state.json
          key: telegram-poll-state-v2
