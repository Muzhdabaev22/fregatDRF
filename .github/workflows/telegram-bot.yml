name: Telegram bot poll

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [telegram-poll]

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Poll Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_FORWARD_CHAT_ID: ${{ secrets.TG_FORWARD_CHAT_ID }}
        run: php telegram-forward-bot/poll.php

      - name: Save poll state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add telegram-forward-bot/poll-state.json
          if git diff --staged --quiet; then
            echo "poll-state unchanged"
            exit 0
          fi
          git commit -m "bot: update poll state [skip ci]"
          git push
